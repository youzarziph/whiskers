<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Whiskers</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="browser">

      <!-- ── Tab bar ───────────────────────────────────────────────── -->
      <div id="tab-bar">
        <div id="tabs"></div>
        <button id="new-tab-btn" title="New tab">+</button>
      </div>

      <!-- ── Navigation bar ───────────────────────────────────────── -->
      <div id="nav-bar">
        <button class="nav-btn" id="back-btn" title="Back">&#8592;</button>
        <button class="nav-btn" id="forward-btn" title="Forward">&#8594;</button>
        <button class="nav-btn" id="refresh-btn" title="Refresh">&#8635;</button>

        <div id="address-bar-wrap">
          <span id="https-badge">🔒</span>
          <input
            id="address-bar"
            type="text"
            placeholder="Search or enter address..."
            autocomplete="off"
            spellcheck="false"
          />
        </div>

        <div id="tracker-badge" title="Trackers blocked on this page">
          🛡 <span id="tracker-count">0</span>
        </div>
      </div>

      <!-- ── WebView / content area ────────────────────────────────── -->
      <div id="webview-container">
        <!-- Tauri injects the actual WebView here at runtime.       -->
        <!-- The new-tab page is shown when no URL is loaded.        -->
        <div id="new-tab-page">
          <div id="new-tab-inner">
            <div id="logo">🐱 Whiskers</div>
            <p id="tagline">Private by default. Honest about it.</p>
            <div id="search-wrap">
              <input
                id="search-input"
                type="text"
                placeholder="Search with DuckDuckGo..."
                autocomplete="off"
              />
              <button id="search-btn">Go</button>
            </div>
            <div id="stats-bar">
              <span>🛡 <strong id="total-blocked">0</strong> trackers blocked total</span>
            </div>
          </div>
        </div>
      </div>

    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
